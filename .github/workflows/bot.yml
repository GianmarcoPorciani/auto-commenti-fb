name: auto-commenti-fb

on:
  schedule:
    # ogni ORA, solo di giorno. Cron in UTC: 04-22 UTC = circa 06:00-24:00 ora italiana.
    # In piu', il bot stesso salta le ore 00-06 italiane (gestione precisa di ora legale/solare).
    - cron: "0 4-22 * * *"
  workflow_dispatch: {}       # permette anche l'avvio manuale dal sito GitHub

# evita che due esecuzioni si sovrappongano
concurrency:
  group: bot
  cancel-in-progress: false

permissions:
  contents: write             # serve per ri-salvare lo stato (done/visti/likati) nel repo

jobs:
  rispondi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Rispondi + like ai commenti nuovi
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -u reply_bot.py --ultimi-post 5 --live --max 40

      - name: Salva lo stato nel repo (unione a prova di conflitto)
        run: |
          git config user.name "auto-commenti-bot"
          git config user.email "bot@users.noreply.github.com"
          STATO="done.json visti.json likati.json coda.json classificati.json"
          ok=0
          for i in 1 2 3 4 5; do
            git fetch origin main || true
            python merge_stato.py FETCH_HEAD $STATO || true
            git reset --soft FETCH_HEAD
            git add $STATO || true
            if git diff --cached --quiet; then
              echo "stato invariato, niente da salvare"; ok=1; break
            fi
            git commit -m "stato aggiornato" || true
            if git push; then ok=1; break; fi
            echo "push rifiutato, ritento ($i)..."; sleep 3
          done
          [ "$ok" = "1" ] || echo "stato non salvato dopo 5 tentativi (riprovera' al giro successivo)"
