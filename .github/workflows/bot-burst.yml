name: auto-commenti-fb (giro lampo)

# Giro extra piu' frequente, ma SOLO quando c'e' un post fresco (spinta "ora d'oro").
# Se non ci sono post recenti, esce subito (costo zero).

on:
  schedule:
    # ai minuti :20 e :40 di ogni ora diurna (il giro normale gira al minuto :00)
    - cron: "20,40 4-22 * * *"
  workflow_dispatch: {}

# stesso gruppo del giro normale: i due non si sovrappongono mai (niente doppioni)
concurrency:
  group: bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lampo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installa dipendenze
        run: pip install -r requirements.txt
      - name: Giro lampo (solo se post < 3h)
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -u reply_bot.py --ultimi-post 2 --live --max 40 --solo-se-post-recente 3
      - name: Salva lo stato nel repo
        run: |
          git config user.name "auto-commenti-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add done.json visti.json likati.json || true
          git commit -m "stato aggiornato (lampo)" || echo "niente di nuovo da salvare"
          git push || true
