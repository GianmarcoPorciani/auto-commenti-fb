name: auto-commenti-fb (giro lampo)

# Giro extra "ora d'oro": ai minuti :15 e :45 di ogni ora diurna. Sommato al giro normale
# (:00 e :30) porta la cadenza a UN GIRO OGNI 15 MIN nelle prime 2h dopo una pubblicazione.
# SOLO se c'e' un post fresco (< 2h): altrimenti esce subito (costo zero).

on:
  schedule:
    # :15 e :45 (il giro normale gira a :00 e :30) -> ogni 15 min quando c'e' un post recente.
    # Cron 24h: e' il codice a fermarsi fuori orario (attivo 08:00-00:00, fuso Europe/Rome).
    - cron: "15,45 * * * *"
  workflow_dispatch: {}

# stesso gruppo del giro normale: i due non si sovrappongono mai (niente doppioni)
concurrency:
  group: bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lampo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installa dipendenze
        run: pip install -r requirements.txt
      - name: Giro lampo (solo se post < 2h) - pause piu' strette (ora d'oro)
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -u reply_bot.py --ultimi-post 2 --live --max 40 --solo-se-post-recente 2 --pausa-min 15 --pausa-max 35 --like-min 2 --like-max 6
      - name: Salva lo stato nel repo (unione a prova di conflitto)
        run: |
          git config user.name "auto-commenti-bot"
          git config user.email "bot@users.noreply.github.com"
          STATO="done.json visti.json likati.json coda.json classificati.json"
          ok=0
          for i in 1 2 3 4 5; do
            git fetch origin main || true
            python merge_stato.py FETCH_HEAD $STATO || true
            git reset --soft FETCH_HEAD
            git add $STATO || true
            if git diff --cached --quiet; then
              echo "stato invariato, niente da salvare"; ok=1; break
            fi
            git commit -m "stato aggiornato (lampo)" || true
            if git push; then ok=1; break; fi
            echo "push rifiutato, ritento ($i)..."; sleep 3
          done
          [ "$ok" = "1" ] || echo "stato non salvato dopo 5 tentativi (riprovera' al giro successivo)"
