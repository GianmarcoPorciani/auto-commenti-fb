name: auto-commenti-fb (giro lampo)

# Giro extra piu' frequente, ma SOLO quando c'e' un post fresco (spinta "ora d'oro").
# Se non ci sono post recenti, esce subito (costo zero).

on:
  schedule:
    # ai minuti :20 e :40 di ogni ora diurna (il giro normale gira al minuto :00)
    - cron: "20,40 4-22 * * *"
  workflow_dispatch: {}

# stesso gruppo del giro normale: i due non si sovrappongono mai (niente doppioni)
concurrency:
  group: bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lampo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installa dipendenze
        run: pip install -r requirements.txt
      - name: Giro lampo (solo se post < 3h)
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -u reply_bot.py --ultimi-post 2 --live --max 40 --solo-se-post-recente 3
      - name: Salva lo stato nel repo (unione a prova di conflitto)
        run: |
          git config user.name "auto-commenti-bot"
          git config user.email "bot@users.noreply.github.com"
          STATO="done.json visti.json likati.json coda.json classificati.json"
          ok=0
          for i in 1 2 3 4 5; do
            git fetch origin main || true
            python merge_stato.py FETCH_HEAD $STATO || true
            git reset --soft FETCH_HEAD
            git add $STATO || true
            if git diff --cached --quiet; then
              echo "stato invariato, niente da salvare"; ok=1; break
            fi
            git commit -m "stato aggiornato (lampo)" || true
            if git push; then ok=1; break; fi
            echo "push rifiutato, ritento ($i)..."; sleep 3
          done
          [ "$ok" = "1" ] || echo "stato non salvato dopo 5 tentativi (riprovera' al giro successivo)"
